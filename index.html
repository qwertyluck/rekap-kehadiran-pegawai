<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi Kejaksaan Negeri Maluku Tenggara</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* CSS tetap sama agar konsisten */
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f6f9; color: #333; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #2c3e50; margin: 5px 0; }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; border: 1px solid #dee2e6; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #7f8c8d; padding: 6px; text-align: center; }
        th { background: #34495e; color: white; }
        .nama-kolom { text-align: left; min-width: 200px; font-weight: bold; background-color: #f9f9f9; }
        .nip-teks { font-size: 10px; color: #7f8c8d; font-weight: normal; display: block; }
        .input-absen { width: 35px; border: none; text-align: center; font-weight: bold; text-transform: uppercase; background: transparent; outline: none; }
        .rekap-cell { font-weight: bold; background: #f1f2f6; }
        .libur { background-color: #ffb4b4 !important; cursor: not-allowed; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 450px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; margin-top: 10px; }
        @media print { .no-print { display: none !important; } thead { display: table-header-group !important; } tr { page-break-inside: avoid !important; } .input-absen { display: none !important; } .print-val { display: inline !important; font-weight: bold; } }
        .print-val { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>REKAPITULASI ABSENSI PEGAWAI</h2>
        <h3>KEJAKSAAN NEGERI MALUKU TENGGARA</h3>
    </div>

    <div class="controls no-print">
        <select id="bulan" onchange="render()"></select>
        <input type="number" id="tahun" value="2026" onchange="gantiTahun()" style="width: 80px;">
        <button onclick="window.print()" style="background:#c0392b;">📄 Cetak PDF (F4)</button>
        <button onclick="bukaAdmin()" style="background:#8e44ad;">⚙️ Panel Admin</button>
    </div>

    <div class="table-wrapper">
        <table id="tabelUtama"><thead></thead><tbody></tbody></table>
    </div>
</div>

<div id="modalAdmin" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Kelola Pegawai</h3>
        <div id="listAdmin" style="margin: 15px 0;"></div>
        <hr>
        <input type="text" id="nBaru" placeholder="Nama Pegawai" style="width:90%; margin-bottom:5px;">
        <input type="text" id="nipBaru" placeholder="NIP" style="width:90%; margin-bottom:5px;">
        <button onclick="tambah()" style="background:#27ae60; width:100%;">Tambah Pegawai</button>
        <button onclick="document.getElementById('modalAdmin').style.display='none'" style="background:#95a5a6; width:100%;">Tutup</button>
    </div>
</div>

<script>
// Data Awal
const pegawaiDefault = [
    {n:"LUSIA MARIA RENJAAN, S.H.", nip:"196911021991032003"}, {n:"ANDI SAIFULLAH SAKTI, SH.", nip:"199305292019021008"}
];

let pegawai = JSON.parse(localStorage.getItem('daftarPegawai')) || pegawaiDefault;
let liburNasional = [];

// Memastikan render dipanggil setiap kali data pegawai berubah
function render() {
    const b = parseInt(document.getElementById('bulan').value);
    const t = parseInt(document.getElementById('tahun').value);
    const jmlHari = new Date(t, b+1, 0).getDate();
    const dataTersimpan = JSON.parse(localStorage.getItem(`absensi_${t}_${b}`)) || {};
    
    // Header
    let head = `<tr><th rowspan="2">NO</th><th rowspan="2">NAMA / NIP</th><th colspan="${jmlHari}">TANGGAL</th><th colspan="6">REKAP</th></tr><tr>`;
    for(let i=1; i<=jmlHari; i++) head += `<th>${i}</th>`;
    head += `<th>H</th><th>I</th><th>S</th><th>DL</th><th>CT</th><th>A</th></tr>`;
    document.querySelector('thead').innerHTML = head;

    // Body
    let body = "";
    pegawai.forEach((p, i) => {
        body += `<tr><td>${i+1}</td><td class="nama-kolom">${p.n}<br><span class="nip-teks">${p.nip}</span></td>`;
        for(let d=1; d<=jmlHari; d++) {
            let tglObj = new Date(t, b, d);
            let tglStr = `${t}-${String(b+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let isLibur = (tglObj.getDay() === 0 || tglObj.getDay() === 6 || liburNasional.includes(tglStr));
            let val = (dataTersimpan[i] && dataTersimpan[i][d]) ? dataTersimpan[i][d] : "";
            body += `<td class="${isLibur ? 'libur' : ''}">
                <input type="text" class="input-absen" id="i-${i}-${d}" maxlength="2" value="${val}" ${isLibur?'disabled':`onkeyup="hitung(${i}, ${jmlHari}); simpan()"`}>
                <span class="print-val">${val}</span>
            </td>`;
        }
        body += `<td id="rH-${i}" class="rekap-cell">0</td><td id="rI-${i}" class="rekap-cell">0</td><td id="rS-${i}" class="rekap-cell">0</td><td id="rDL-${i}" class="rekap-cell">0</td><td id="rCT-${i}" class="rekap-cell">0</td><td id="rA-${i}" class="rekap-cell">0</td></tr>`;
    });
    document.querySelector('tbody').innerHTML = body;
    pegawai.forEach((p, i) => hitung(i, jmlHari));
}

// Sinkronisasi data admin
function tambah() {
    let n = document.getElementById('nBaru').value, nip = document.getElementById('nipBaru').value;
    if(n && nip) { 
        pegawai.push({n, nip}); 
        localStorage.setItem('daftarPegawai', JSON.stringify(pegawai)); 
        render(); // Langsung render ulang agar tabel bertambah
        bukaAdmin(); 
    }
}

function hapus(i) { 
    pegawai.splice(i,1); 
    localStorage.setItem('daftarPegawai', JSON.stringify(pegawai)); 
    render(); // Langsung render ulang agar tabel berkurang
    bukaAdmin(); 
}

function bukaAdmin() {
    document.getElementById('modalAdmin').style.display='flex';
    let l = document.getElementById('listAdmin'); l.innerHTML = "";
    pegawai.forEach((p,i) => l.innerHTML += `<div style="margin-bottom:5px;">${p.n} <button onclick="hapus(${i})" style="background:#c0392b; padding:2px 5px;">X</button></div>`);
}

// ... Fungsi lain tetap (hitung, simpan, gantiTahun) ...
function hitung(i, jml) { /* ... fungsi hitung ... */ }
function simpan() { /* ... fungsi simpan ... */ }
function gantiTahun() { /* ... fungsi api ... */ }

// Inisialisasi awal
const b = document.getElementById('bulan');
["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"].forEach((m,i)=> b.innerHTML += `<option value="${i}">${m}</option>`);
b.value = new Date().getMonth();
gantiTahun();
</script>
</body>
</html>
