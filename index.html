<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi Kejaksaan Negeri Maluku Tenggara</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f6f9; color: #333; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #2c3e50; margin: 5px 0; }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; border: 1px solid #dee2e6; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border: 1px solid #7f8c8d; padding: 6px; text-align: center; }
        th { background: #34495e; color: white; }
        .nama-kolom { text-align: left; min-width: 200px; font-weight: bold; background-color: #f9f9f9; }
        .nip-teks { font-size: 10px; color: #7f8c8d; font-weight: normal; display: block; }
        .input-absen { width: 35px; border: none; text-align: center; font-weight: bold; text-transform: uppercase; background: transparent; outline: none; }
        .rekap-cell { font-weight: bold; background: #f1f2f6; }
        .libur { background-color: #ffb4b4 !important; cursor: not-allowed; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 450px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; margin-top: 10px; }
        .only-print { display: none; }
        @media print {
            @page { size: 330mm 210mm landscape; margin: 10mm; }
            .no-print { display: none !important; }
            .only-print { display: block; }
            thead { display: table-header-group !important; }
            tr { page-break-inside: avoid !important; }
            .input-absen { display: none !important; }
            .print-val { display: inline !important; font-weight: bold; }
        }
        .print-val { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>REKAPITULASI ABSENSI PEGAWAI</h2>
        <h3>KEJAKSAAN NEGERI MALUKU TENGGARA</h3>
    </div>
    
    <div class="only-print" style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin:0; font-size: 16px;">REKAPITULASI ABSENSI PEGAWAI</h2>
        <h3 style="margin:5px 0; font-size: 14px;">KEJAKSAAN NEGERI MALUKU TENGGARA</h3>
        <h4 id="cetakPeriode" style="margin:0; font-size: 12px; font-weight: normal;"></h4>
    </div>

    <div class="controls no-print">
        <select id="bulan" onchange="render()"></select>
        <input type="number" id="tahun" value="2026" onchange="gantiTahun()" style="width: 80px;">
        <button onclick="window.print()" style="background:#c0392b;">📄 Cetak PDF (F4)</button>
        <button onclick="bukaAdmin()" style="background:#8e44ad;">⚙️ Panel Admin</button>
        <button onclick="eksporExcel()" style="background:#2ecc71; color:#000;">📊 Excel</button>
        <button onclick="eksporTXT()" style="background:#27ae60;">📥 ADK TXT</button>
    </div>

    <div class="table-wrapper">
        <table id="tabelUtama"><thead></thead><tbody></tbody></table>
    </div>

    <div class="only-print" style="margin-top: 40px; page-break-inside: avoid;">
        <table style="width: 100%; border: none; font-size: 12px;">
            <tr><td style="width: 65%;"></td>
            <td style="width: 35%; text-align: center;">
                <span id="cetakLokasiTgl">Langgur, 5 Juli 2026</span><br>Mengetahui,<br>Kepala Kejaksaan Negeri Maluku Tenggara<br><br><br><br><br>
                <u><b>Dr. Fadjar, S.H., M.H.</b></u><br>NIP. 197411112002121003
            </td></tr>
        </table>
    </div>
</div>

<div id="modalAdmin" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Kelola Pegawai</h3>
        <div id="listAdmin" style="margin: 15px 0;"></div><hr>
        <input type="text" id="nBaru" placeholder="Nama" style="width:90%;"><br>
        <input type="text" id="nipBaru" placeholder="NIP" style="width:90%;">
        <button onclick="tambah()" style="background:#27ae60; width:100%;">Tambah</button>
        <button onclick="document.getElementById('modalAdmin').style.display='none'" style="background:#95a5a6; width:100%;">Tutup</button>
    </div>
</div>

<script>
const webAppUrl = "https://script.google.com/macros/s/AKfycbw_PpWVMGmXFWO17_IT1jxzmPfmBYKQhFVT13YMl0JSh_-mO_ux2xVEidia-kN4U25j2w/exec";
let pegawai = JSON.parse(localStorage.getItem('daftarPegawai')) || [
    {n:"LUSIA MARIA RENJAAN, S.H.", nip:"196911021991032003"}, {n:"ANDI SAIFULLAH SAKTI, SH.", nip:"199305292019021008"},
    {n:"JHON THIMOTIUS PADALANI, SH", nip:"199309012019021010"}, {n:"RAMDHANI", nip:"198306222002121005"},
    {n:"RIGO ROLYS ATARWAMAN, A.Md", nip:"198502192009121003"}, {n:"MAHESA ARYO BIMO, S.H.", nip:"199905112022031002"},
    {n:"RAMLI BUGIS, SH", nip:"197606121998031005"}, {n:"VINDRIANITA, A.Md.KOM", nip:"199804132022032005"},
    {n:"KETUT IRWAN RISWANDI", nip:"199806172022031003"}, {n:"HENDRY JODIE PAIMIN, A.Md", nip:"199407252022031002"},
    {n:"BUDIWAN ALI", nip:"198802192020121007"}, {n:"AVEL HAEZER MATANDE, SH", nip:"199407052019021007"},
    {n:"FADJAR, SH.", nip:"197411112002121002"}, {n:"SAIFUL ANWAR", nip:"198203102002121003"},
    {n:"RAIHAN THAHIR, SH", nip:"199706032024041002"}, {n:"MHD. WALID R. NASUTION, S.H.", nip:"199712302024041001"},
    {n:"JARU YEHEZKIEL, S.H.", nip:"199901142024041003"}, {n:"TARUNA ADI PERKASA", nip:"199704182024041003"},
    {n:"DWI SETIYAWAN NUGROHO, SH", nip:"199405122018011005"}, {n:"DAIKAN AOLIA ARFAN, SH.", nip:"199007012015011001"},
    {n:"JOSEPH A. HEATUBUN", nip:"196807111989031002"}
];
let liburNasional = [], dataAbsensiCloud = [];

async function loadData() {
    try {
        let r = await fetch(webAppUrl);
        dataAbsensiCloud = await r.json();
    } catch(e) { console.log("Load Cloud Gagal"); }
    render();
}

function render() {
    const b = parseInt(document.getElementById('bulan').value);
    const t = parseInt(document.getElementById('tahun').value);
    const jml = new Date(t, b+1, 0).getDate();
    
    let head = `<tr><th rowspan="2">NO</th><th rowspan="2">NAMA / NIP</th><th colspan="${jml}">TANGGAL</th><th colspan="6">REKAP</th></tr><tr>`;
    for(let i=1; i<=jml; i++) head += `<th>${i}</th>`;
    head += `<th>H</th><th>I</th><th>S</th><th>DL</th><th>CT</th><th>A</th></tr>`;
    document.querySelector('thead').innerHTML = head;

    let body = "";
    pegawai.forEach((p, i) => {
        body += `<tr><td>${i+1}</td><td class="nama-kolom">${p.n}<br>${p.nip}</td>`;
        for(let d=1; d<=jml; d++) {
            let tglStr = `${t}-${b+1}-${d}`;
            let item = dataAbsensiCloud.find(x => x.nip == p.nip && x.tanggal == tglStr);
            let val = item ? item.status : "";
            let libur = (new Date(t, b, d).getDay()==0 || new Date(t, b, d).getDay()==6);
            body += `<td class="${libur?'libur':''}"><input type="text" class="input-absen" maxlength="2" value="${val}" ${libur?'disabled':`onkeyup="simpanAbsen('${p.nip}', '${tglStr}', this.value)"`}></td>`;
        }
        body += `<td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
    });
    document.querySelector('tbody').innerHTML = body;
}

function simpanAbsen(nip, tgl, status) {
    fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nip, tanggal: tgl, status: status.toUpperCase() }) });
}

function tambah() {
    let n = document.getElementById('nBaru').value, nip = document.getElementById('nipBaru').value;
    if(n && nip) { pegawai.push({n, nip}); localStorage.setItem('daftarPegawai', JSON.stringify(pegawai)); render(); bukaAdmin(); }
}
function bukaAdmin() { document.getElementById('modalAdmin').style.display='flex'; let l = document.getElementById('listAdmin'); l.innerHTML = ""; pegawai.forEach((p,i) => l.innerHTML += `<div>${p.n} <button onclick="hapus(${i})">X</button></div>`); }
function hapus(i) { pegawai.splice(i,1); localStorage.setItem('daftarPegawai', JSON.stringify(pegawai)); render(); bukaAdmin(); }
function gantiTahun() { render(); }

// Init
["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"].forEach((m,i)=> document.getElementById('bulan').innerHTML += `<option value="${i}">${m}</option>`);
document.getElementById('bulan').value = new Date().getMonth();
loadData();
</script>
</body>
</html>
