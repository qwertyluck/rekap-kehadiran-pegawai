<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi Kejaksaan</title>
</head>
<body>
    <div id="app" style="text-align:center; padding:50px;">Memuat aplikasi...</div>
    <script>
        // Gunakan URL yang sama:
        const url = "https://script.google.com/macros/s/AKfycbxie1D1AzCN2lNTPB3ZFHz5geQYa1V0-ztw9Ci7STPe8zrOda7xsXKu_QkSwbFh6cbIIg/exec";
        
        async function testConnection() {
            try {
                let r = await fetch(url);
                let data = await r.json();
                document.getElementById('app').innerHTML = "Koneksi Berhasil! Pegawai ditemukan: " + data.pegawai.length;
                console.log(data);
            } catch(e) {
                document.getElementById('app').innerHTML = "Gagal. Error: " + e;
            }
        }
        testConnection();
    </script>
</body>
</html>
