<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Kejaksaan Negeri Maluku Tenggara</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #34495e; --secondary: #27ae60; --danger: #c0392b; --accent: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: var(--primary); }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 8px; display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        
        /* Sticky Header & Table Styles */
        .table-wrapper { overflow-x: auto; max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        thead th { position: sticky; top: 0; background: var(--primary); color: white; z-index: 10; padding: 10px; }
        th, td { border: 1px solid #bdc3c7; padding: 8px; text-align: center; }
        .nama-kolom { text-align: left; min-width: 180px; font-weight: bold; }
        .input-absen { width: 25px; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; }
        .libur { background-color: #ffeaea !important; }
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; transition: 0.3s; }
        button:hover { filter: brightness(110%); transform: scale(1.02); }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 400px; }
        
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 1001; bottom: 30px; }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body>

<div class="container">
    <h2>REKAPITULASI ABSENSI PEGAWAI</h2>
    <h3>KEJAKSAAN NEGERI MALUKU TENGGARA</h3>

    <div class="controls">
        <select id="bulan" onchange="render()"></select>
        <input type="number" id="tahun" value="2026" onchange="render()" style="width: 70px; padding: 5px;">
        <button style="background:var(--danger)" onclick="window.print()">📄 Cetak PDF</button>
        <button style="background:var(--secondary)" onclick="exportExcel()">📊 Export Excel</button>
        <button style="background:var(--accent)" onclick="bukaAdmin()">⚙️ Panel Admin</button>
    </div>

    <div class="table-wrapper">
        <table id="tabelUtama"><thead></thead><tbody></tbody></table>
    </div>
</div>

<div id="toast">Data Berhasil Disimpan!</div>

<div id="modalAdmin" class="modal">
    <div class="modal-content">
        <h3>Kelola Pegawai</h3>
        <div id="listAdmin" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
        <input type="text" id="nBaru" placeholder="Nama Pegawai" style="width:95%; padding:8px; margin-bottom:5px;">
        <input type="text" id="nipBaru" placeholder="NIP (Angka Saja)" oninput="this.value = this.value.replace(/[^0-9]/g, '')" style="width:95%; padding:8px; margin-bottom:10px;">
        <button onclick="tambah()" style="background:var(--secondary); width:100%;">Tambah Pegawai</button>
        <button onclick="document.getElementById('modalAdmin').style.display='none'" style="background:#95a5a6; width:100%; margin-top:5px;">Tutup</button>
    </div>
</div>

<script>
let pegawai = JSON.parse(localStorage.getItem('daftarPegawai')) || [
    {n:"LUSIA MARIA RENJAAN, S.H.", nip:"196911021991032003"},
    {n:"ANDI SAIFULLAH SAKTI, SH.", nip:"199305292019021008"}
];

function showToast(msg) {
    let t = document.getElementById("toast");
    t.innerText = msg; t.className = "show";
    setTimeout(() => { t.className = ""; }, 3000);
}

function render() {
    const b = parseInt(document.getElementById('bulan').value);
    const t = parseInt(document.getElementById('tahun').value);
    const jmlHari = new Date(t, b+1, 0).getDate();
    const dataTersimpan = JSON.parse(localStorage.getItem(`absensi_${t}_${b}`)) || {};

    let head = `<tr><th rowspan="2">NO</th><th rowspan="2">NAMA / NIP</th><th colspan="${jmlHari}">TANGGAL</th><th colspan="6">REKAP</th></tr><tr>`;
    for(let i=1; i<=jmlHari; i++) head += `<th>${i}</th>`;
    head += `<th>H</th><th>I</th><th>S</th><th>DL</th><th>CT</th><th>A</th></tr>`;
    document.querySelector('thead').innerHTML = head;

    let body = "";
    pegawai.forEach((p, i) => {
        body += `<tr><td>${i+1}</td><td class="nama-kolom">${p.n}<br><small>${p.nip}</small></td>`;
        for(let d=1; d<=jmlHari; d++) {
            let tgl = new Date(t, b, d);
            let isLibur = (tgl.getDay() === 0 || tgl.getDay() === 6);
            let val = (dataTersimpan[i] && dataTersimpan[i][d]) ? dataTersimpan[i][d] : "";
            body += `<td class="${isLibur ? 'libur' : ''}">
                <input type="text" class="input-absen" id="i-${i}-${d}" maxlength="2" value="${val}" 
                ${isLibur?'disabled':`onkeyup="hitung(${i}, ${jmlHari}); simpan()"`}>
            </td>`;
        }
        body += `<td id="rH-${i}">0</td><td id="rI-${i}">0</td><td id="rS-${i}">0</td><td id="rDL-${i}">0</td><td id="rCT-${i}">0</td><td id="rA-${i}">0</td></tr>`;
    });
    document.querySelector('tbody').innerHTML = body;
    pegawai.forEach((_, i) => hitung(i, jmlHari));
}

function hitung(i, jmlHari) {
    let r = { 'H':0, 'I':0, 'S':0, 'DL':0, 'CT':0, 'A':0 };
    for (let d=1; d<=jmlHari; d++) {
        let v = document.getElementById(`i-${i}-${d}`).value.toUpperCase();
        if (r.hasOwnProperty(v)) r[v]++;
    }
    for (let k in r) document.getElementById(`r${k}-${i}`).innerText = r[k];
}

function simpan() {
    const b = document.getElementById('bulan').value;
    const t = document.getElementById('tahun').value;
    const jmlHari = new Date(t, parseInt(b)+1, 0).getDate();
    let data = {};
    for (let i = 0; i < pegawai.length; i++) {
        data[i] = {};
        for (let d = 1; d <= jmlHari; d++) data[i][d] = document.getElementById(`i-${i}-${d}`).value;
    }
    localStorage.setItem(`absensi_${t}_${b}`, JSON.stringify(data));
}

function exportExcel() {
    XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelUtama")), "Rekap_Absensi.xlsx");
    showToast("File sedang diunduh...");
}

function tambah() {
    let n = document.getElementById('nBaru').value, nip = document.getElementById('nipBaru').value;
    if(n && nip) {
        pegawai.push({n, nip});
        localStorage.setItem('daftarPegawai', JSON.stringify(pegawai));
        render(); bukaAdmin(); showToast("Pegawai berhasil ditambah");
    }
}

function bukaAdmin() {
    document.getElementById('modalAdmin').style.display='flex';
    let l = document.getElementById('listAdmin'); l.innerHTML = "";
    pegawai.forEach((p,i) => l.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">${p.n} <button onclick="hapus(${i})" style="background:var(--danger); padding:2px 8px;">Hapus</button></div>`);
}

function hapus(i) {
    pegawai.splice(i,1); localStorage.setItem('daftarPegawai', JSON.stringify(pegawai));
    render(); bukaAdmin();
}

// Inisialisasi
const b = document.getElementById('bulan');
["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"].forEach((m,i)=> b.innerHTML += `<option value="${i}">${m}</option>`);
b.value = new Date().getMonth(); render();
</script>
</body>
</html>
